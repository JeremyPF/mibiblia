plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

// Lee key.properties si existe (CI y producción)
def keyProperties = new Properties()
def keyPropertiesFile = rootProject.file('key.properties')
if (keyPropertiesFile.exists()) {
    keyPropertiesFile.withReader('UTF-8') { reader ->
        keyProperties.load(reader)
    }
}

android {
    namespace "com.personal.mi_biblia"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions { jvmTarget = '1.8' }
    sourceSets { main.java.srcDirs += 'src/main/kotlin' }

    signingConfigs {
        release {
            if (keyPropertiesFile.exists()) {
                keyAlias      keyProperties['keyAlias']
                keyPassword   keyProperties['keyPassword']
                storeFile     file(keyProperties['storeFile'])
                storePassword keyProperties['storePassword']
            } else {
                // Desarrollo local sin key.properties → debug
                keyAlias      signingConfigs.debug.keyAlias
                keyPassword   signingConfigs.debug.keyPassword
                storeFile     signingConfigs.debug.storeFile
                storePassword signingConfigs.debug.storePassword
            }
        }
    }

    defaultConfig {
        applicationId "com.personal.mi_biblia"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

flutter { source '../..' }
dependencies {}
