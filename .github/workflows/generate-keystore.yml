name: Generate Keystore (run once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Generate keystore
      run: |
        keytool -genkey -v \
          -keystore mibiblia.jks \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -alias mibiblia \
          -storepass mibiblia2024 \
          -keypass mibiblia2024 \
          -dname "CN=MiBiblia, OU=Personal, O=MiBiblia, L=Unknown, S=Unknown, C=US"

    - name: Print Base64 (copy this to KEYSTORE_BASE64 secret)
      run: base64 -w 0 mibiblia.jks
