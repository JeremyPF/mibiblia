name: Generate Keystore (run once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Generate JKS keystore
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        keytool -genkey -v \
          -keystore mibiblia.jks \
          -storetype JKS \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -alias "$KEY_ALIAS" \
          -storepass "$KEYSTORE_PASSWORD" \
          -keypass "$KEY_PASSWORD" \
          -dname "CN=MiBiblia, OU=Personal, O=MiBiblia, L=Unknown, S=Unknown, C=US"

    - name: Print Base64 with openssl (copy this to KEYSTORE_BASE64 secret)
      run: openssl base64 -A -in mibiblia.jks
