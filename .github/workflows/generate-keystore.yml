name: Generate Keystore (run once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Generate PKCS12 keystore
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        keytool -genkeypair -v \
          -keystore mibiblia.p12 \
          -storetype PKCS12 \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -alias "$KEY_ALIAS" \
          -storepass "$KEYSTORE_PASSWORD" \
          -dname "CN=MiBiblia, OU=Personal, O=MiBiblia, L=Unknown, S=Unknown, C=US"
        
        echo "Generated keystore size: $(stat -c%s mibiblia.p12) bytes"
        
        # Verify it's readable
        keytool -list -keystore mibiblia.p12 -storetype PKCS12 -storepass "$KEYSTORE_PASSWORD" -v
        
        echo "=== COPY THE LINE BELOW TO KEYSTORE_BASE64 SECRET ==="
        openssl base64 -A -in mibiblia.p12
        echo ""
        echo "=== END ==="
