name: Build Flutter App (Android)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK (Universal)
      run: flutter build apk --release
    
    - name: Rename APK
      run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/mibiblia-universal.apk
    
    - name: Upload Universal APK
      uses: actions/upload-artifact@v4
      with:
        name: mibiblia-universal-apk
        path: build/app/outputs/flutter-apk/mibiblia-universal.apk
        compression-level: 0
