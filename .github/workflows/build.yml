name: Build Flutter App (Android)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release --build-number=${{ github.run_number }} --build-name=1.0.${{ github.run_number }}
    
    - name: Rename APK
      run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/mibiblia-v1.0.${{ github.run_number }}.apk
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: MiBiblia v1.0.${{ github.run_number }}
        body: |
          ## MiBiblia v1.0.${{ github.run_number }}
          
          ### Cambios en esta versión
          - Build automático #${{ github.run_number }}
          - Commit: ${{ github.sha }}
          
          ### Instalación
          1. Descarga el archivo APK
          2. Activa "Instalar apps de fuentes desconocidas" en tu dispositivo Android
          3. Instala la aplicación
          
          ### Libros disponibles
          - Proverbios (31 capítulos)
          - Mateo (28 capítulos)
          - Juan (21 capítulos)
        files: build/app/outputs/flutter-apk/mibiblia-v1.0.${{ github.run_number }}.apk
        draft: false
        prerelease: false
