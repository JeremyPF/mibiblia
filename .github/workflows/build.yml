name: Build Flutter App (Android)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true

    - name: Decode keystore and write key.properties
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/mibiblia.jks
        printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=mibiblia.jks\n' \
          '${{ secrets.KEYSTORE_PASSWORD }}' \
          '${{ secrets.KEY_PASSWORD }}' \
          '${{ secrets.KEY_ALIAS }}' \
          > android/key.properties

    - name: Verify keystore
      run: |
        echo "=== key.properties ==="
        cat android/key.properties
        echo "=== keystore type ==="
        keytool -list -keystore android/app/mibiblia.jks \
          -storepass '${{ secrets.KEYSTORE_PASSWORD }}' 2>&1 | head -5

    - name: Get dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release --build-number=${{ github.run_number }} --build-name=1.0.${{ github.run_number }}

    - name: Upload APK to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Build ${{ github.run_number }}
        files: build/app/outputs/flutter-apk/app-release.apk
