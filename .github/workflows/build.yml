name: Build Flutter App (Android)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true

    - name: Get dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release --build-number=${{ github.run_number }} --build-name=1.0.${{ github.run_number }}

    - name: Sign APK
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        # Decode keystore
        printf '%s' "$KEYSTORE_BASE64" | base64 -d > /tmp/signing.p12
        
        # Verify file is valid
        ls -la /tmp/signing.p12
        
        # Sign with apksigner
        BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/33.0.1
        $BUILD_TOOLS/apksigner sign \
          --ks /tmp/signing.p12 \
          --ks-key-alias "$KEY_ALIAS" \
          --ks-pass "pass:$KEYSTORE_PASSWORD" \
          --key-pass "pass:$KEYSTORE_PASSWORD" \
          --out build/app/outputs/apk/release/app-release-signed.apk \
          build/app/outputs/apk/release/app-release.apk
        
        # Cleanup
        rm /tmp/signing.p12

    - name: Upload APK to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Build ${{ github.run_number }}
        files: build/app/outputs/apk/release/app-release-signed.apk
